name: github-actions
on: [push, pull_request]
jobs:
    scan-for-secrets:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: gitleaks/gitleaks-action@v2.3.9
              with:
                fetch-depth: 0
              env:
                github_token: ${{ secrets.GITHUB_TOKEN }}
    install-dependencies-and-run-tests:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
           # - run: ls -la - troubleshooting step to check the contents of the repository 
            - run: sudo apt-get update && sudo apt-get install -y python3 python3-pip
            - run: sudo pip install -r requirements.txt --ignore-installed urllib3
            - run: python3 -m venv venv
            - run: source ./venv/bin/activate
            - run: pytest ./app/endpoint-tests.py
    build-docker:
        runs-on: ubuntu-latest
        needs: install-dependencies-and-run-tests
        steps:
            - uses: actions/checkout@v6
            - run: ls -la
            - run: docker build -t myapp:latest .
