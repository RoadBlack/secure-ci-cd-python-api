name: github-actions
on: [push, pull_request]
jobs:
    scan-for-secrets:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
              with:
                fetch-depth: 0
            - uses: gitleaks/gitleaks-action@v2.3.9
              env:
                github_token: ${{ secrets.GITHUB_TOKEN }}
                GITLEAKS_VERSION: latest
    sast-scan:
        needs: scan-for-secrets
        name: semgrep/ci
        runs-on: ubuntu-latest
        container:
            image: semgrep/semgrep
        if: (github.actor != 'dependabot[bot]')
        steps:
            - uses: actions/checkout@v6
            - run: semgrep ci 
              env:
                SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
    install-dependencies-and-run-tests:
        needs: sast-scan
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
           # - run: ls -la - troubleshooting step to check the contents of the repository 
            - run: sudo apt-get update && sudo apt-get install -y python3 python3-pip
            - run: sudo pip install -r requirements.txt --ignore-installed urllib3
            - run: python3 -m venv venv
            - run: source ./venv/bin/activate
            - run: pytest ./app/endpoint-tests.py
    build-docker-and-test:
        runs-on: ubuntu-latest
        needs: install-dependencies-and-run-tests
        steps:
            - uses: actions/checkout@v6
            - run: ls -la
            - name: Build Docker Image
              run: docker build -t myapp:latest .
            - name: Run trivy vulnerability scan
              uses: aquasecurity/trivy-action@v0.36.0
              with:
                image-ref: myapp:latest
                format: table
                exit-code: 1
                vuln-type: 'os,library'
                severity: 'HIGH,CRITICAL' 
                trivyignores: .trivyignore.yaml
            - name: Upload Vulnerability Report
              uses: actions/upload-artifact@v4
              with:
                name: trivy-report
                path: trivy-report.json
                retention-days: 30